name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: TypeScript typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test
      - name: Tenant RLS audit
        run: bun run test:tenant-rls
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGPORT: ${{ secrets.PGPORT }}
        continue-on-error: true
      - name: Tenant isolation integration suite
        # Skips automatically (exit 0) if Supabase secrets are absent.
        # When secrets are present, ANY cross-tenant leak fails CI.
        run: bun run test:tenant-isolation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      - name: Tenant admin role invariant
        # Fails CI if any tenant has vendor users but no admin role.
        run: bun run test:tenant-admin-invariant
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Build
        run: bun run build
